<div &id="id" &class="className">
  <noop &foreach="scheduleItems as scheduleItem">
    <ScheduleRow
      &anchor="scheduleItem.anchor"
      &anchorHref="scheduleItem.anchorHref"
      &time="scheduleItem.time"
      &title="scheduleItem.title"
      &body="scheduleItem.body"
      &talks="scheduleItem.talks"
      &className="(id 'grid border-b border-ink last:border-b-0 md:grid-cols-[10rem_1fr]')"
    ></ScheduleRow>
  </noop>
</div>
