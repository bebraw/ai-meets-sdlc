<div &id="id" &class="className">
  <ScheduleRow
    &time="(id '08:00-08:50')"
    &title="(id 'Doors open')"
    &body="(id 'Coffee and arrivals.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '08:50-09:00')"
    &title="(id 'Opening')"
    &body="(id 'Welcome and framing for the day.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '09:00-10:30')"
    &title="(id 'Industry perspectives')"
    &body="(id 'Talks or a joint session on applied AI in software development, ending with a brief panel.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '10:30-11:00')"
    &title="(id 'Break')"
    &body="(id 'Coffee and hallway discussion.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '11:00-12:30')"
    &title="(id 'Views from academia')"
    &body="(id 'Short research-driven talks on AI and software development.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '12:30-13:30')"
    &title="(id 'Lunch and posters')"
    &body="(id 'Lunch break with poster sessions.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '13:30-15:00')"
    &title="(id 'Views from industry')"
    &body="(id 'Short field reports from teams applying AI across the SDLC.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '15:00-15:30')"
    &title="(id 'Afternoon coffee')"
    &body="(id 'Break and informal discussion.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '15:30-17:00')"
    &title="(id 'Academia')"
    &body="(id 'Deeper academic sessions on current research and open questions.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '17:00-17:15')"
    &title="(id 'Short break')"
    &body="(id 'Reset before the closing panel.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '17:15-17:45')"
    &title="(id 'Closing panel')"
    &body="(id 'Academia and industry in discussion.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '17:45-18:00')"
    &title="(id 'Wrap-up')"
    &body="(id 'Closing remarks and group photos.')"
    &className="(id 'grid border-b border-ink md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
  <ScheduleRow
    &time="(id '18:00-21:00')"
    &title="(id 'Afterparty')"
    &body="(id 'Informal evening gathering.')"
    &className="(id 'grid md:grid-cols-[10rem_1fr]')"
  ></ScheduleRow>
</div>
