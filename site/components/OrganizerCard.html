<figure class="group bg-ink">
  <LazyImage
    &src="src"
    &alt="name"
    &className="(id 'aspect-square w-full object-cover grayscale transition duration-300 group-hover:grayscale-0')"
    &width="(id '500')"
    &height="(id '500')"
  ></LazyImage>
  <figcaption
    class="border-t border-paper px-3 py-2 text-sm font-bold uppercase"
    &children="name"
  ></figcaption>
</figure>
