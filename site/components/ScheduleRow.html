<div &id="anchor" &class="className">
  <time
    class="border-b border-ink p-4 font-headline text-2xl font-black uppercase leading-none md:border-b-0 md:border-r"
    &children="time"
  ></time>
  <div class="p-4">
    <div class="flex items-start gap-3">
      <h3
        class="min-w-0 font-headline text-2xl font-black uppercase"
        &children="title"
      ></h3>
      <a
        &href="anchorHref"
        class="mt-[0.08em] shrink-0 font-headline text-xl font-black leading-none text-muted transition hover:text-ink focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ink"
        data-a11y-target
        aria-label="Link to schedule session"
        >#</a
      >
    </div>
    <p class="mt-2 leading-7 text-muted" &children="body"></p>
    <div class="mt-5 grid gap-5 border-t border-ink pt-5" &visibleIf="talks">
      <noop &foreach="talks as talkItem">
        <article class="grid gap-5 min-[720px]:grid-cols-[8rem_1fr]">
          <div class="grid w-32 gap-2 min-[720px]:w-full">
            <noop &foreach="talkItem.speakers as speakerItem">
              <LazyImage
                &visibleIf="speakerItem.photo"
                &src="speakerItem.photo"
                &alt="speakerItem.name"
                &className="(id 'aspect-square w-full border border-ink object-cover grayscale')"
                &width="(id '400')"
                &height="(id '400')"
              ></LazyImage>
            </noop>
          </div>
          <div class="grid gap-4">
            <h4
              class="font-headline text-3xl font-black uppercase leading-none"
              &children="talkItem.title"
            ></h4>
            <div
              class="leading-7 text-muted [&_a]:font-bold [&_a]:text-ink [&_a]:underline [&_a]:underline-offset-4 [&_li]:mb-2 [&_ol]:list-decimal [&_ol]:pl-6 [&_p]:mb-4 [&_p:last-child]:mb-0 [&_ul]:list-disc [&_ul]:pl-6"
              &children="talkItem.abstractHtml"
            ></div>
            <noop &foreach="talkItem.speakers as speakerItem">
              <div class="border-t border-ink pt-4">
                <a
                  &href="speakerItem.speakerHref"
                  class="font-headline text-2xl font-black uppercase hover:underline"
                  &children="speakerItem.name"
                ></a>
                <p
                  class="mt-1 font-bold leading-6 text-muted"
                  &children="speakerItem.role"
                ></p>
                <div
                  class="mt-3 leading-7 text-muted [&_a]:font-bold [&_a]:text-ink [&_a]:underline [&_a]:underline-offset-4 [&_li]:mb-2 [&_ol]:list-decimal [&_ol]:pl-6 [&_p]:mb-4 [&_p:last-child]:mb-0 [&_ul]:list-disc [&_ul]:pl-6"
                  &children="speakerItem.bioHtml"
                ></div>
                <div class="mt-4 flex flex-wrap gap-3">
                  <a
                    &visibleIf="speakerItem.website"
                    &href="speakerItem.website"
                    class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
                    >Website</a
                  >
                  <a
                    &visibleIf="speakerItem.linkedin"
                    &href="speakerItem.linkedin"
                    class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
                    >LinkedIn</a
                  >
                  <a
                    &visibleIf="speakerItem.scholar"
                    &href="speakerItem.scholar"
                    class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
                    >Scholar</a
                  >
                  <a
                    &visibleIf="speakerItem.github"
                    &href="speakerItem.github"
                    class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
                    >GitHub</a
                  >
                  <a
                    &visibleIf="speakerItem.x"
                    &href="speakerItem.x"
                    class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
                    >X</a
                  >
                </div>
              </div>
            </noop>
          </div>
        </article>
      </noop>
    </div>
  </div>
</div>
