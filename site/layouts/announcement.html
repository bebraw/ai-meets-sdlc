<BaseLayout
  &title="announcementItem.title"
  &description="announcementItem.summary"
  &ogDescription="announcementItem.summary"
  &url="announcementItem.url"
  &ogType="(id 'article')"
  &articlePublishedTime="announcementItem.date.time"
  &articleModifiedTime="announcementItem.modifiedTime"
  &articleAuthor="announcementItem.author"
  &structuredData="announcementItem.structuredData"
>
  <article>
    <header class="relative border-b border-ink">
      <div
        class="absolute -left-24 top-16 h-80 w-80 rounded-full border border-ink/20 text-ink/15 halftone"
      ></div>
      <div class="relative mx-auto max-w-7xl px-5 py-16 md:px-8 md:py-24">
        <div class="max-w-5xl">
          <p
            class="font-headline text-sm font-black uppercase text-muted"
            &children="announcementItem.eyebrow"
          ></p>
          <h1
            class="mt-3 font-headline text-[clamp(3.25rem,10vw,10rem)] font-black uppercase leading-[0.78]"
            &children="announcementItem.title"
          ></h1>
          <p
            &visibleIf="announcementItem.subtitle"
            class="mt-5 max-w-3xl text-2xl font-bold leading-8 text-muted md:text-3xl md:leading-9"
            &children="announcementItem.subtitle"
          ></p>
        </div>
        <div
          class="mt-8 grid gap-4 border-y border-ink py-6 md:grid-cols-[12rem_1fr]"
        >
          <div
            class="flex flex-col items-start gap-2 self-start text-sm font-bold uppercase leading-none text-muted"
          >
            <time
              &datetime="announcementItem.date.iso"
              &children="announcementItem.date.display"
            ></time>
            <p
              &visibleIf="announcementItem.author"
              &children="announcementItem.author"
            ></p>
          </div>
          <p
            class="max-w-3xl text-xl leading-8 text-muted"
            &children="announcementItem.summary"
          ></p>
        </div>
      </div>
    </header>

    <section class="border-b border-ink">
      <div
        class="mx-auto grid max-w-7xl gap-10 px-5 py-16 md:px-8 lg:grid-cols-[16rem_minmax(0,48rem)]"
      >
        <aside class="border-y border-ink py-5 lg:border-y-0 lg:border-r lg:py-0 lg:pr-6">
          <p class="font-headline text-sm font-black uppercase text-muted">
            Event
          </p>
          <p class="mt-3 font-bold leading-6" &children="seminar.display.dateShortVenueLocation"></p>
        </aside>
        <div>
          <div
            class="[&_a]:font-bold [&_a]:text-ink [&_a]:underline [&_a]:underline-offset-4 [&_h2>a]:ml-3 [&_h2>a]:inline-flex [&_h2>a]:min-h-6 [&_h2>a]:min-w-6 [&_h2>a]:items-center [&_h2>a]:justify-center [&_h2>a]:text-[0.65em] [&_h2>a]:text-muted [&_h2>a]:no-underline [&_h2>a]:transition [&_h2>a:hover]:text-ink [&_h2>span]:min-w-0 [&_h2]:mb-4 [&_h2]:mt-10 [&_h2]:flex [&_h2]:items-start [&_h2]:break-words [&_h2]:font-headline [&_h2]:text-4xl [&_h2]:font-black [&_h2]:uppercase [&_h2]:leading-none [&_h2]:text-ink [&_ol]:list-decimal [&_ol]:pl-6 [&_p]:mb-6 [&_p:last-child]:mb-0 [&_strong]:text-ink [&_ul]:list-disc [&_ul]:pl-6 text-xl leading-9 text-muted"
            &children="announcementItem.bodyHtml"
          >
          </div>
          <div class="mt-8 flex flex-wrap gap-3">
            <a
              class="inline-flex border border-ink bg-ink px-5 py-3 text-base font-bold uppercase text-paper transition hover:bg-paper hover:text-ink"
              href="/checkout/"
              >Buy tickets</a
            >
            <a
              class="inline-flex border border-ink px-5 py-3 text-base font-bold uppercase transition hover:bg-ink hover:text-paper"
              href="/schedule/"
              >Schedule</a
            >
            <a
              class="inline-flex border border-ink px-5 py-3 text-base font-bold uppercase transition hover:bg-ink hover:text-paper"
              href="/speakers/"
              >Speakers</a
            >
          </div>
        </div>
      </div>
    </section>
  </article>
</BaseLayout>
