<BaseLayout
  &title="(id 'SDLCAI Announcements')"
  &description="(id 'Announcements and updates for SDLCAI, a one-day seminar on AI across the software development lifecycle.')"
  &ogDescription="(id 'Official SDLCAI announcements and event updates.')"
  &url="(id 'https://sdlcai.org/announcements/')"
  &ogType="(id 'website')"
>
  <section class="relative border-b border-ink">
    <div
      class="absolute -right-24 top-12 h-80 w-80 rounded-full border border-ink/20 text-ink/15 halftone"
    ></div>
    <div class="relative mx-auto max-w-7xl px-5 py-16 md:px-8 md:py-24">
      <p class="font-headline text-sm font-black uppercase text-muted">
        SDLCAI
      </p>
      <h1
        class="mt-3 max-w-full font-headline text-[clamp(3.4rem,12vw,11rem)] font-black uppercase leading-[0.74]"
      >
        News
      </h1>
      <div class="mt-8 max-w-3xl border-y border-ink py-6">
        <p class="text-xl leading-8 text-muted">
          Official announcements and event updates for SDLCAI.
        </p>
      </div>
    </div>
  </section>

  <section class="border-b border-ink">
    <div class="mx-auto max-w-7xl px-5 py-16 md:px-8">
      <div class="grid gap-px border border-ink bg-ink">
        <noop &foreach="announcementItems as announcementItem">
          <article class="grid gap-5 bg-paper p-5 md:grid-cols-[12rem_1fr] md:p-6">
            <div>
              <p
                class="font-headline text-sm font-black uppercase text-muted"
                &children="announcementItem.eyebrow"
              ></p>
              <time
                class="mt-2 block text-sm font-bold uppercase text-muted"
                &datetime="announcementItem.date.iso"
                &children="announcementItem.date.display"
              ></time>
            </div>
            <div class="max-w-3xl">
              <h2
                class="font-headline text-4xl font-black uppercase leading-none md:text-5xl"
                &children="announcementItem.title"
              ></h2>
              <p
                class="mt-4 text-lg leading-8 text-muted"
                &children="announcementItem.summary"
              ></p>
              <a
                &href="announcementItem.href"
                class="mt-6 inline-flex border border-ink bg-ink px-5 py-3 text-base font-bold uppercase text-paper transition hover:bg-paper hover:text-ink"
                >Read announcement</a
              >
            </div>
          </article>
        </noop>
      </div>
    </div>
  </section>
</BaseLayout>
