<?xml version="1.0" encoding="utf-8" ?>
<feed xmlns="http://www.w3.org/2005/Atom">
  <title &children="announcementFeed.title"></title>
  <subtitle &children="announcementFeed.description"></subtitle>
  <id &children="announcementFeed.url"></id>
  <link rel="alternate" type="text/html" &href="announcementFeed.url" />
  <link rel="self" type="application/atom+xml" &href="announcementFeed.feedUrl" />
  <updated &children="announcementFeed.updated"></updated>
  <noop &foreach="announcementFeed.items as announcementItem">
    <entry>
      <title &children="announcementItem.title"></title>
      <id &children="announcementItem.url"></id>
      <link rel="alternate" type="text/html" &href="announcementItem.url" />
      <published &children="announcementItem.date.time"></published>
      <updated &children="announcementItem.modifiedTime"></updated>
      <author &visibleIf="announcementItem.author">
        <name &children="announcementItem.author"></name>
      </author>
      <summary &children="announcementItem.summary"></summary>
    </entry>
  </noop>
</feed>
