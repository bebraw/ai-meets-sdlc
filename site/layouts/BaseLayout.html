<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title &children="title"></title>
    <meta name="description" &content="description" />
    <meta name="robots" &content="robots" &visibleIf="robots" />
    <meta property="og:title" &content="title" />
    <meta property="og:description" &content="ogDescription" />
    <meta property="og:url" &content="url" />
    <meta property="og:image" content="https://sdlcai.org/og.png?v=20260618" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://sdlcai.org/og.png?v=20260618" />
    <script type="application/ld+json" &visibleIf="eventSchema">
      {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "SDLCAI: AI Meets SDLC",
        "description": "A one-day seminar at Marsio Saastamoinen Foundation Stage, Aalto University, on how AI is changing software development lifecycles.",
        "startDate": "2026-10-13T08:00:00+03:00",
        "endDate": "2026-10-13T21:00:00+03:00",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventStatus": "https://schema.org/EventScheduled",
        "image": "https://sdlcai.org/og.png?v=20260618",
        "url": "https://sdlcai.org/",
        "location": {
          "@type": "Place",
          "name": "Marsio Saastamoinen Foundation Stage",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Espoo",
            "addressCountry": "FI"
          }
        },
        "organizer": {
          "@type": "Organization",
          "name": "Toska Osuuskunta",
          "url": "https://sdlcai.org/"
        }
      }
    </script>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
      &visibleIf="turnstile"
    ></script>
    <style>
      @view-transition {
        navigation: auto;
      }
    </style>
    <script>
      (() => {
        const root = document.documentElement;
        let theme = "light";

        try {
          const stored = localStorage.getItem("sdlcai-theme");
          const prefersDark = matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          theme =
            stored === "dark" || stored === "light"
              ? stored
              : prefersDark
                ? "dark"
                : "light";
        } catch {
          theme = "light";
        }

        root.classList.toggle("dark", theme === "dark");
        root.dataset.theme = theme;
      })();
    </script>
    <noop &foreach="styles as style">
      <link &href="style.href" &rel="style.rel" />
    </noop>
  </head>
  <body class="bg-paper text-ink">
    <div class="min-h-screen overflow-hidden">
      <SiteHeader></SiteHeader>
      <main &children="(get props children)"></main>
      <SiteFooter></SiteFooter>
    </div>
    <noop &children="(get props afterContent)"></noop>
    <noop &foreach="scripts as script">
      <script &src="script.src" &type="script.type"></script>
    </noop>
  </body>
</html>
