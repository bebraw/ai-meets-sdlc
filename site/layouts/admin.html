<BaseLayout
  &title="(id 'SDLCAI Admin')"
  &description="(id 'Admin tools for SDLCAI interest list management.')"
  &ogDescription="(id 'Admin tools for SDLCAI interest list management.')"
  &url="(id 'https://sdlcai.org/admin/')"
  &robots="(id 'noindex,nofollow')"
>
  <section class="border-b border-ink">
    <div
      class="mx-auto grid max-w-7xl gap-8 px-5 py-12 md:grid-cols-[22rem_1fr] md:px-8 md:py-16"
    >
      <div>
        <p class="font-headline text-sm font-black uppercase text-muted">
          Admin
        </p>
        <h1
          class="mt-3 font-headline text-5xl font-black uppercase leading-none md:text-7xl"
        >
          Interest list
        </h1>
      </div>
      <div class="grid content-end gap-5">
        <p class="max-w-3xl text-xl leading-8 text-muted">
          People who asked to be notified when SDLCAI registration opens.
        </p>
        <div class="flex flex-wrap items-center gap-3">
          <a
            class="inline-flex border border-ink bg-ink px-5 py-3 text-base font-bold uppercase text-paper transition hover:bg-paper hover:text-ink"
            href="/api/admin/interests.csv"
            >Export CSV</a
          >
          <p
            class="min-h-6 text-sm font-bold uppercase text-muted"
            data-admin-status
            aria-live="polite"
          >
            Loading
          </p>
        </div>
      </div>
    </div>
  </section>

  <section class="px-5 py-8 md:px-8">
    <div class="mx-auto max-w-7xl">
      <div
        class="overflow-x-auto border border-ink"
        tabindex="0"
        aria-label="Interest list table"
      >
        <table class="w-full min-w-[52rem] border-collapse text-left">
          <thead class="bg-ink text-paper">
            <tr>
              <th class="px-4 py-3 text-sm font-bold uppercase">Email</th>
              <th class="px-4 py-3 text-sm font-bold uppercase">Name</th>
              <th class="px-4 py-3 text-sm font-bold uppercase">
                Organization
              </th>
              <th class="px-4 py-3 text-sm font-bold uppercase">Created</th>
            </tr>
          </thead>
          <tbody data-admin-interests>
            <tr>
              <td class="px-4 py-4 text-muted" colspan="4">
                Loading interested people.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</BaseLayout>
