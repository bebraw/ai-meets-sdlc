<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDLCAI Admin</title>
    <meta
      name="description"
      content="Admin tools for SDLCAI interest list management."
    />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const root = document.documentElement;
        let theme = "light";

        try {
          const stored = localStorage.getItem("sdlcai-theme");
          const prefersDark = matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          theme =
            stored === "dark" || stored === "light"
              ? stored
              : prefersDark
                ? "dark"
                : "light";
        } catch {
          theme = "light";
        }

        root.classList.toggle("dark", theme === "dark");
        root.dataset.theme = theme;
      })();
    </script>
    <noop &foreach="styles as style">
      <link &href="style.href" &rel="style.rel" />
    </noop>
  </head>
  <body class="bg-paper text-ink">
    <div class="min-h-screen overflow-hidden">
      <header class="border-b border-ink">
        <nav
          class="mx-auto flex max-w-7xl items-center justify-between px-5 py-5 md:px-8"
        >
          <a href="/" class="inline-flex items-center" aria-label="SDLCAI">
            <img
              src="/assets/logo.svg"
              alt="SDLCAI"
              class="h-10 w-auto dark:invert"
            />
          </a>
          <div class="flex items-center gap-3">
            <a
              class="hidden text-sm font-bold uppercase hover:underline sm:inline"
              href="/"
              >Home</a
            >
            <button
              class="border border-ink px-3 py-2 text-sm font-bold uppercase transition hover:bg-ink hover:text-paper"
              type="button"
              data-theme-toggle
              aria-label="Toggle dark mode"
            >
              <span data-theme-label>Dark</span>
            </button>
          </div>
        </nav>
      </header>

      <main>
        <section class="border-b border-ink">
          <div
            class="mx-auto grid max-w-7xl gap-8 px-5 py-12 md:grid-cols-[22rem_1fr] md:px-8 md:py-16"
          >
            <div>
              <p class="font-headline text-sm font-black uppercase text-muted">
                Admin
              </p>
              <h1
                class="mt-3 font-headline text-5xl font-black uppercase leading-none md:text-7xl"
              >
                Interest list
              </h1>
            </div>
            <div class="grid content-end gap-5">
              <p class="max-w-3xl text-xl leading-8 text-muted">
                People who asked to be notified when SDLCAI registration opens.
              </p>
              <div class="flex flex-wrap items-center gap-3">
                <a
                  class="inline-flex border border-ink bg-ink px-5 py-3 text-base font-bold uppercase text-paper transition hover:bg-paper hover:text-ink"
                  href="/api/admin/interests.csv"
                  >Export CSV</a
                >
                <p
                  class="min-h-6 text-sm font-bold uppercase text-muted"
                  data-admin-status
                  aria-live="polite"
                >
                  Loading
                </p>
              </div>
            </div>
          </div>
        </section>

        <section class="px-5 py-8 md:px-8">
          <div class="mx-auto max-w-7xl">
            <div class="overflow-x-auto border border-ink">
              <table class="w-full min-w-[52rem] border-collapse text-left">
                <thead class="bg-ink text-paper">
                  <tr>
                    <th class="px-4 py-3 text-sm font-bold uppercase">Email</th>
                    <th class="px-4 py-3 text-sm font-bold uppercase">Name</th>
                    <th class="px-4 py-3 text-sm font-bold uppercase">
                      Organization
                    </th>
                    <th class="px-4 py-3 text-sm font-bold uppercase">
                      Created
                    </th>
                  </tr>
                </thead>
                <tbody data-admin-interests>
                  <tr>
                    <td class="px-4 py-4 text-muted" colspan="4">
                      Loading interested people.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      (() => {
        const rowsRoot = document.querySelector("[data-admin-interests]");
        const status = document.querySelector("[data-admin-status]");

        function setStatus(message) {
          if (status) status.textContent = message;
        }

        function cell(value) {
          const td = document.createElement("td");
          td.className = "border-t border-ink px-4 py-3 align-top";
          td.textContent = value || "-";

          return td;
        }

        function renderRows(contacts) {
          if (!rowsRoot) return;

          rowsRoot.replaceChildren();

          if (!contacts.length) {
            const tr = document.createElement("tr");
            const td = cell("No interested people yet.");
            td.colSpan = 4;
            tr.append(td);
            rowsRoot.append(tr);
            return;
          }

          for (const contact of contacts) {
            const tr = document.createElement("tr");
            tr.append(
              cell(contact.email),
              cell(contact.name),
              cell(contact.organization),
              cell(contact.created_at),
            );
            rowsRoot.append(tr);
          }
        }

        async function loadInterests() {
          try {
            const response = await fetch("/api/admin/interests", {
              headers: { accept: "application/json" },
            });

            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }

            const payload = await response.json();
            const contacts = Array.isArray(payload.contacts)
              ? payload.contacts
              : [];

            renderRows(contacts);
            setStatus(`${contacts.length} people`);
          } catch (error) {
            renderRows([]);
            setStatus("Failed to load");
            console.error(error);
          }
        }

        loadInterests();
      })();
    </script>

    <noop &foreach="scripts as script">
      <script &src="script.src" &type="script.type"></script>
    </noop>
  </body>
</html>
