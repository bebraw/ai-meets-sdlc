<BaseLayout
  &title="(id 'SDLCAI Schedule')"
  &description="(id 'Schedule for SDLCAI, a one-day seminar on AI across the software development lifecycle.')"
  &ogDescription="(id 'The SDLCAI seminar schedule for 13 October 2026 at Aalto University.')"
  &url="(id 'https://sdlcai.org/schedule/')"
>
  <section class="relative border-b border-ink">
    <div
      class="absolute -left-20 top-20 h-72 w-72 rounded-full border border-ink/20 text-ink/15 halftone"
    ></div>
    <div class="relative mx-auto max-w-7xl px-5 py-16 md:px-8 md:py-24">
      <div class="min-w-0">
        <p
          class="font-headline text-sm font-black uppercase text-muted"
          &children="seminar.display.dateShortVenueLocation"
        ></p>
        <h1
          class="mt-3 font-headline text-[clamp(4rem,16vw,13rem)] font-black uppercase leading-[0.74]"
        >
          Schedule
        </h1>
      </div>
      <div
        class="mt-8 grid gap-6 border-y border-ink py-6 md:ml-auto md:max-w-3xl"
      >
        <p class="max-w-3xl text-xl leading-8 text-muted">
          A single-track day for software practitioners, researchers, and
          engineering leaders, moving from shared framing into research talks,
          field reports, posters, and panel discussion.
        </p>
        <div class="flex flex-wrap gap-3">
          <a
            class="inline-flex border border-ink bg-ink px-5 py-3 text-base font-bold uppercase text-paper transition hover:bg-paper hover:text-ink"
            href="/calendar.ics"
            >Add to calendar</a
          >
          <a
            class="inline-flex border border-ink px-5 py-3 text-base font-bold uppercase transition hover:bg-ink hover:text-paper"
            href="/speakers/"
            >Speakers</a
          >
        </div>
      </div>
    </div>
  </section>

  <section class="border-b border-ink">
    <div
      class="mx-auto grid max-w-7xl gap-10 px-5 py-16 md:px-8 lg:grid-cols-[22rem_1fr]"
    >
      <div>
        <p class="font-headline text-sm font-black uppercase text-muted">
          Seminar day
        </p>
        <SectionHeading
          &title="(id 'Day flow')"
          &href="(id '#day-flow')"
          &ariaLabel="(id 'Link to day flow section')"
          &className="(id 'mt-3 flex items-start gap-3 font-headline text-5xl font-black uppercase leading-none md:text-7xl')"
          &anchorClassName="(id 'mt-[0.06em] inline-block shrink-0 text-[0.45em] leading-none text-muted transition hover:text-ink focus-visible:outline focus-visible:outline-2 focus-visible:outline-ink')"
        ></SectionHeading>
      </div>
      <SeminarSchedule
        &id="(id 'day-flow')"
        &className="(id 'grid border border-ink')"
      ></SeminarSchedule>
    </div>
  </section>
</BaseLayout>
